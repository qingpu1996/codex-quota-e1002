[platformio]
default_envs = reterminal_e1002

[env:reterminal_e1002]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git#9e97e019ace102952d03f299a94ee8353f5a8043
board = seeed-xiao-esp32-s3-sense
framework = arduino
upload_speed = 115200
monitor_speed = 115200
board_build.arduino.memory_type = qio_opi
extra_scripts =
    pre:scripts/apply_features.py

build_flags =
    -D BOARD_HAS_PSRAM
    -I src
    -I include

lib_deps =
    https://github.com/Seeed-Studio/Seeed_GFX#a2de1abca0597c202193f22d01e9fa35d1ff613b
    bblanchon/ArduinoJson@7.4.3
